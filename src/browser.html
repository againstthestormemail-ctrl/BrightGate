<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightGate Browser</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00c8ff;--red:#ff3d5a;--amber:#ffb800;--green:#00ff88;--bg:#04080f;--panel:#0a1422;--border:rgba(0,200,255,0.15);--text:#d0e8ff;--muted:rgba(180,220,255,0.45)}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* BROWSER CHROME */
.browser-bar{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(4,8,15,0.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  height:48px;
}
.site-badge{
  display:flex;align-items:center;gap:8px;
  padding:5px 14px;border-radius:20px;
  background:rgba(0,200,255,0.08);
  border:1px solid var(--border);
  font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;
  color:var(--cyan);flex-shrink:0;
}
.site-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.url-display{
  flex:1;padding:6px 12px;border-radius:8px;
  background:rgba(0,200,255,0.04);border:1px solid var(--border);
  font-size:12px;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:default;user-select:none;
}
.nav-btn{
  width:32px;height:32px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,200,255,0.08)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.close-btn{
  padding:5px 14px;border-radius:20px;
  border:1px solid rgba(255,61,90,0.35);background:rgba(255,61,90,0.08);
  color:var(--red);cursor:pointer;font-family:'Orbitron',monospace;
  font-size:9px;letter-spacing:2px;transition:all .15s;flex-shrink:0;
}
.close-btn:hover{background:rgba(255,61,90,0.2);border-color:var(--red)}

/* WEBVIEW */
webview{
  flex:1;width:100%;border:none;
  background:#fff;
}

/* BLOCKED PAGE */
.blocked-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(4,8,15,0.96);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;text-align:center;padding:40px;
}
.blocked-overlay.show{display:flex}
.blocked-icon{font-size:60px}
.blocked-title{font-family:'Orbitron',monospace;font-size:18px;letter-spacing:3px;color:var(--red)}
.blocked-url{font-size:13px;color:var(--muted);max-width:500px;word-break:break-all;padding:8px 16px;border-radius:8px;background:rgba(255,61,90,0.08);border:1px solid rgba(255,61,90,0.2)}
.blocked-msg{font-size:14px;color:var(--text);line-height:1.7;max-width:420px}
.blocked-back{padding:10px 24px;border-radius:20px;border:1px solid rgba(0,200,255,0.3);background:rgba(0,200,255,0.08);color:var(--cyan);cursor:pointer;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;transition:all .2s}
.blocked-back:hover{background:rgba(0,200,255,0.18)}

/* LOADING BAR */
.load-bar{height:2px;background:var(--cyan);width:0%;transition:width .3s;position:fixed;top:48px;left:0;right:0;z-index:50;opacity:0}
.load-bar.active{opacity:1}
</style>
</head>
<body>

<div class="load-bar" id="load-bar"></div>

<div class="browser-bar">
  <div class="site-badge">
    <div class="site-dot"></div>
    <span id="site-name">Loading...</span>
  </div>
  <button class="nav-btn" id="btn-back" title="Back" disabled>←</button>
  <button class="nav-btn" id="btn-fwd" title="Forward" disabled>→</button>
  <button class="nav-btn" id="btn-reload" title="Reload">↺</button>
  <div class="url-display" id="url-display">Loading...</div>
  <div style="font-family:'Orbitron',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;flex-shrink:0">🔒 LOCKED</div>
  <button class="close-btn" onclick="closeBrowser()">✕ CLOSE</button>
</div>

<webview id="wv" src="about:blank" allowpopups="false" disableblinkfeatures="Auxclick"></webview>

<div class="blocked-overlay" id="blocked-overlay">
  <div class="blocked-icon">🚫</div>
  <div class="blocked-title">SITE NOT ALLOWED</div>
  <div class="blocked-url" id="blocked-url-text"></div>
  <div class="blocked-msg">This website isn't on the approved list for this mode.<br>Ask a parent to add it if you need access.</div>
  <button class="blocked-back" onclick="hideBlocked()">← GO BACK</button>
</div>

<script>
// Parse params from query string
const params = new URLSearchParams(window.location.search);
const startUrl = params.get('url') || 'about:blank';
const tileTitle = params.get('title') || 'Web';
let rules = [];
try { rules = JSON.parse(params.get('rules') || '[]'); } catch(e) {}

const wv = document.getElementById('wv');
const loadBar = document.getElementById('load-bar');
const urlDisplay = document.getElementById('url-display');
const siteName = document.getElementById('site-name');
const btnBack = document.getElementById('btn-back');
const btnFwd = document.getElementById('btn-fwd');

document.title = tileTitle + ' — BrightGate';
siteName.textContent = tileTitle.toUpperCase();

// URL checking — mirrors main process logic
function isAllowed(urlStr) {
  try {
    const u = new URL(urlStr.startsWith('http') ? urlStr : 'https://' + urlStr);
    const hostname = u.hostname.replace(/^www\./, '');
    const fullPath = hostname + u.pathname;
    // Check blocks
    for (const rule of rules) {
      if (!rule.startsWith('!')) continue;
      const blocked = rule.slice(1).replace(/^www\./, '').replace(/\/\*$/, '');
      if (fullPath.startsWith(blocked)) return false;
    }
    // Check allows
    for (const rule of rules) {
      if (rule.startsWith('!')) continue;
      const clean = rule.replace(/^www\./, '').replace(/\/\*$/, '');
      if (!clean.includes('/')) {
        if (hostname === clean || hostname.endsWith('.' + clean)) return true;
      } else {
        if (fullPath.startsWith(clean)) return true;
      }
    }
    return false;
  } catch(e) { return false; }
}

function showBlocked(url) {
  document.getElementById('blocked-url-text').textContent = url;
  document.getElementById('blocked-overlay').classList.add('show');
}
function hideBlocked() {
  document.getElementById('blocked-overlay').classList.remove('show');
  if (wv.canGoBack()) wv.goBack();
}

// Nav buttons
btnBack.onclick = () => { if (wv.canGoBack()) wv.goBack(); };
btnFwd.onclick = () => { if (wv.canGoForward()) wv.goForward(); };
document.getElementById('btn-reload').onclick = () => wv.reload();

// Webview events
wv.addEventListener('did-start-loading', () => {
  loadBar.style.width = '40%';
  loadBar.classList.add('active');
});
wv.addEventListener('did-stop-loading', () => {
  loadBar.style.width = '100%';
  setTimeout(() => { loadBar.classList.remove('active'); loadBar.style.width = '0%'; }, 400);
  btnBack.disabled = !wv.canGoBack();
  btnFwd.disabled = !wv.canGoForward();
  try {
    const url = wv.getURL();
    urlDisplay.textContent = url;
    if (url && url !== 'about:blank' && !isAllowed(url)) {
      showBlocked(url);
      wv.stop();
      if (wv.canGoBack()) wv.goBack();
    }
  } catch(e) {}
});
wv.addEventListener('will-navigate', (e) => {
  if (e.url && e.url !== 'about:blank' && !isAllowed(e.url)) {
    showBlocked(e.url);
  }
});
wv.addEventListener('new-window', (e) => {
  // All new windows — check and load in same webview
  if (isAllowed(e.url)) wv.loadURL(e.url);
  else showBlocked(e.url);
});
wv.addEventListener('page-title-updated', (e) => {
  // Don't update site badge — keep it showing the tile name
});

function closeBrowser() { window.close(); }

// Load initial URL
window.addEventListener('DOMContentLoaded', () => {
  if (startUrl && startUrl !== 'about:blank') {
    if (isAllowed(startUrl)) {
      wv.src = startUrl;
      urlDisplay.textContent = startUrl;
    } else {
      showBlocked(startUrl);
    }
  }
});
</script>
</body>
</html>
