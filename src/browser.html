<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrightGate Browser</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00c8ff;--red:#ff3d5a;--green:#00ff88;--amber:#ffb800;--bg:#04080f;--border:rgba(0,200,255,0.15);--text:#d0e8ff;--muted:rgba(180,220,255,0.45)}
html,body{width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;background:#000;font-family:'Share Tech Mono',monospace}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:0 12px;height:52px;flex-shrink:0;
  background:rgba(4,8,15,0.98);
  border-bottom:2px solid rgba(0,200,255,0.3);
  z-index:10;
}
#site-badge{
  display:flex;align-items:center;gap:7px;
  padding:5px 14px;border-radius:20px;
  background:rgba(0,200,255,0.08);border:1px solid rgba(0,200,255,0.25);
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--cyan);
  flex-shrink:0;white-space:nowrap;
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nbtn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid rgba(0,200,255,0.2);background:transparent;
  color:var(--muted);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.nbtn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,200,255,0.1)}
.nbtn:disabled{opacity:.2;cursor:not-allowed}
#urlbar{
  flex:1;padding:6px 12px;border-radius:8px;
  background:rgba(0,0,0,0.4);border:1px solid rgba(0,200,255,0.12);
  font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(180,220,255,0.6);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:default;user-select:none;
}
#lock-pill{
  padding:4px 10px;border-radius:12px;
  background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:var(--green);
  flex-shrink:0;
}
#close-btn{
  padding:6px 16px;border-radius:20px;
  border:2px solid rgba(255,61,90,0.5);background:rgba(255,61,90,0.1);
  color:var(--red);cursor:pointer;font-family:'Orbitron',monospace;
  font-size:9px;letter-spacing:2px;font-weight:700;transition:all .2s;flex-shrink:0;
}
#close-btn:hover{background:rgba(255,61,90,0.25);border-color:var(--red);box-shadow:0 0 12px rgba(255,61,90,0.3)}

/* ── LOAD BAR ── */
#loadbar{height:2px;background:var(--cyan);width:0;transition:width .3s;flex-shrink:0;opacity:0}
#loadbar.on{opacity:1}

/* ── WEBVIEW ── */
webview{flex:1;width:100%}

/* ── BLOCKED OVERLAY ── */
#blocked{
  position:fixed;inset:0;top:54px;z-index:100;
  background:rgba(4,8,15,0.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:40px;
}
#blocked.show{display:flex}
.b-icon{font-size:64px}
.b-title{font-family:'Orbitron',monospace;font-size:20px;letter-spacing:4px;color:var(--red)}
.b-reason{
  padding:7px 18px;border-radius:20px;
  background:rgba(255,61,90,0.08);border:1px solid rgba(255,61,90,0.25);
  font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,61,90,0.9);
}
.b-msg{font-size:15px;color:var(--text);line-height:1.8;max-width:440px}
.b-url{font-size:11px;color:rgba(180,220,255,0.25);max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Timer ring */
.b-ring{position:relative;display:flex;align-items:center;justify-content:center}
.b-ring svg{position:absolute;transform:rotate(-90deg)}
.b-ring-num{font-family:'Orbitron',monospace;font-size:34px;font-weight:900;color:var(--amber);width:90px;height:90px;display:flex;align-items:center;justify-content:center}

.b-back{
  padding:12px 32px;border-radius:24px;
  border:2px solid rgba(0,200,255,0.4);background:rgba(0,200,255,0.08);
  color:var(--cyan);cursor:pointer;font-family:'Orbitron',monospace;
  font-size:10px;letter-spacing:2px;font-weight:700;transition:all .2s;
}
.b-back:hover{background:rgba(0,200,255,0.2);box-shadow:0 0 16px rgba(0,200,255,0.2)}
</style>
</head>
<body>

<div id="topbar">
  <div id="site-badge"><div class="ldot"></div><span id="site-name">Loading…</span></div>
  <button class="nbtn" id="btn-back" disabled title="Back">←</button>
  <button class="nbtn" id="btn-fwd" disabled title="Forward">→</button>
  <button class="nbtn" id="btn-reload" title="Reload">↺</button>
  <div id="urlbar">Loading…</div>
  <div id="lock-pill">🔒 BRIGHTGATE</div>
  <button id="close-btn" onclick="window.close()">✕ CLOSE &amp; RETURN</button>
</div>

<div id="loadbar"></div>

<webview id="wv"
  src="about:blank"
  useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  allowpopups="false">
</webview>

<div id="blocked">
  <div class="b-icon">🚫</div>
  <div class="b-title">ACCESS BLOCKED</div>
  <div class="b-reason" id="b-reason">This section is not approved</div>
  <div class="b-url" id="b-url"></div>
  <div class="b-msg">This part of the site isn't allowed in this mode.<br>Returning you to the safe page automatically.</div>
  <div class="b-ring">
    <svg width="90" height="90" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="6"/>
      <circle id="ring-arc" cx="45" cy="45" r="38" fill="none" stroke="#ffb800"
        stroke-width="6" stroke-linecap="round" stroke-dasharray="239" stroke-dashoffset="0"/>
    </svg>
    <div class="b-ring-num" id="ring-num">10</div>
  </div>
  <button class="b-back" onclick="goBack()">← RETURN NOW</button>
</div>

<script>
// Parse URL params
const p = new URLSearchParams(location.search);
const startUrl = p.get('url') || 'about:blank';
const title = p.get('title') || 'Web';
let configs = [];
try { configs = JSON.parse(p.get('configs') || p.get('rules') || '[]'); } catch(e){}

const wv = document.getElementById('wv');
const lb = document.getElementById('loadbar');
const urlbar = document.getElementById('urlbar');
const btnBack = document.getElementById('btn-back');
const btnFwd = document.getElementById('btn-fwd');
document.getElementById('site-name').textContent = title.toUpperCase();
document.title = title + ' — BrightGate';

let safeUrl = startUrl;
let blockTimer = null;
let blockSecs = 10;
const CIRC = 239;

// ── URL check (client-side mirror of main process logic) ──
function isOk(url) {
  if (!url || url === 'about:blank' || url.startsWith('file://')) return {ok:true};
  let u;
  try { u = new URL(url.startsWith('http') ? url : 'https://'+url); }
  catch(e) { return {ok:false,r:'Invalid URL'}; }
  const host = u.hostname.replace(/^www\./,'');
  const pathQ = (u.pathname+u.search).toLowerCase();

  for (const cfg of configs) {
    if (!cfg||!cfg.domain) continue;
    const dom = cfg.domain.replace(/^www\./,'').split('/')[0];
    if (host !== dom && !host.endsWith('.'+dom)) continue;
    // Domain matched
    if (cfg.blockedKeys) {
      for (const k of cfg.blockedKeys) {
        if (pathQ.includes(k.toLowerCase())) return {ok:false,r:`"${k}" content blocked`};
      }
    }
    if (cfg.allowedPaths && cfg.allowedPaths.length) {
      const pass = cfg.allowedPaths.some(pp => {
        const c = pp.startsWith('/') ? pp : '/'+pp;
        return u.pathname === '/' || u.pathname.startsWith(c);
      });
      if (!pass) return {ok:false,r:'Section not approved'};
    }
    return {ok:true};
  }
  // No config matched — if blockExternal on any config, block it
  if (configs.some(c=>c.blockExternal)) return {ok:false,r:'External site blocked'};
  return {ok:true};
}

function showBlocked(url, reason) {
  try { wv.stop(); } catch(e){}
  document.getElementById('b-reason').textContent = reason || 'This section is not approved';
  document.getElementById('b-url').textContent = url || '';
  document.getElementById('blocked').classList.add('show');
  clearInterval(blockTimer);
  blockSecs = 10;
  tick();
  blockTimer = setInterval(tick, 1000);
}
function tick() {
  document.getElementById('ring-num').textContent = blockSecs;
  document.getElementById('ring-arc').style.strokeDashoffset = CIRC*(1-blockSecs/10);
  if (blockSecs <= 0) { clearInterval(blockTimer); goBack(); }
  blockSecs--;
}
function hideBlocked() {
  clearInterval(blockTimer);
  document.getElementById('blocked').classList.remove('show');
}
function goBack() {
  hideBlocked();
  try { if (wv.canGoBack()) wv.goBack(); else wv.loadURL(safeUrl); }
  catch(e) { try { wv.loadURL(safeUrl); } catch(e2){} }
}

// ── Nav ──
btnBack.onclick = () => { hideBlocked(); if(wv.canGoBack()) wv.goBack(); };
btnFwd.onclick = () => { if(wv.canGoForward()) wv.goForward(); };
document.getElementById('btn-reload').onclick = () => { hideBlocked(); wv.reload(); };

// ── Webview events ──
wv.addEventListener('did-start-loading', () => {
  lb.style.width='40%'; lb.classList.add('on');
});
wv.addEventListener('did-stop-loading', () => {
  lb.style.width='100%';
  setTimeout(()=>{ lb.classList.remove('on'); lb.style.width='0'; },350);
  btnBack.disabled = !wv.canGoBack();
  btnFwd.disabled = !wv.canGoForward();
  try { urlbar.textContent = wv.getURL(); } catch(e){}
});
wv.addEventListener('did-navigate', e => {
  if (e.url && e.url !== 'about:blank') {
    const r = isOk(e.url);
    if (!r.ok) showBlocked(e.url, r.r);
    else { safeUrl = e.url; hideBlocked(); }
  }
  try { urlbar.textContent = e.url; } catch(e2){}
  btnBack.disabled = !wv.canGoBack();
  btnFwd.disabled = !wv.canGoForward();
});
wv.addEventListener('did-navigate-in-page', e => {
  if (e.url) {
    const r = isOk(e.url);
    if (!r.ok) showBlocked(e.url, r.r);
    else safeUrl = e.url;
    try { urlbar.textContent = e.url; } catch(e2){}
  }
});
wv.addEventListener('new-window', e => {
  const r = isOk(e.url);
  if (r.ok) wv.loadURL(e.url);
  else showBlocked(e.url, r.r);
});
wv.addEventListener('did-fail-load', e => {
  if (e.errorCode !== -3) { // -3 = user aborted
    urlbar.textContent = 'Failed to load page';
  }
});

// ── Initial load ──
document.addEventListener('DOMContentLoaded', () => {
  if (startUrl && startUrl !== 'about:blank') {
    const r = isOk(startUrl);
    if (r.ok) {
      wv.src = startUrl;
      urlbar.textContent = startUrl;
    } else {
      showBlocked(startUrl, r.r);
    }
  }
});
</script>
</body>
</html>
